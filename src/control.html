<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lazy Laser</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        font: 600 13px/1.3 'Segoe UI', system-ui, sans-serif;
        background: #1e1e1e;
        color: #fff;
        padding: 14px;
        user-select: none;
        -webkit-app-region: drag;
      }
      h1 {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #fca5a5;
        margin-bottom: 10px;
      }
      button {
        -webkit-app-region: no-drag;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font: 700 15px/1 'Segoe UI', system-ui, sans-serif;
        cursor: pointer;
      }
      #toggle {
        background: #374151;
        color: #fff;
      }
      #toggle.on {
        background: #ef4444;
        color: #fff;
      }
      #quit {
        margin-top: 8px;
        background: transparent;
        color: #9ca3af;
        font-size: 11px;
        padding: 6px;
      }
      p {
        margin-top: 10px;
        font-size: 11px;
        color: #d1d5db;
        font-weight: 400;
        line-height: 1.45;
        -webkit-app-region: no-drag;
      }
      strong { color: #fca5a5; }
    </style>
  </head>
  <body>
    <h1>Lazy Laser</h1>
    <button id="toggle" type="button">Turn laser ON</button>
    <button id="quit" type="button">Quit</button>
    <p>
      Or press <strong>F8</strong> to toggle.<br />
      Does <em>not</em> change the cursor — move the mouse to see a <strong>red trail</strong>.
      Do <em>not</em> use Ctrl+Shift+L (that is AMD software).
    </p>
    <script src="control.js"></script>
  </body>
</html>
