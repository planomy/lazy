<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lazy Laser</title>
    <style>
      * { box-sizing: border-box; margin: 0; }
      body {
        font: 600 13px/1.3 'Segoe UI', system-ui, sans-serif;
        background: #1e1e1e;
        color: #fff;
        padding: 12px;
        user-select: none;
        -webkit-app-region: drag;
      }
      h1 {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #fca5a5;
        margin-bottom: 10px;
      }
      button {
        -webkit-app-region: no-drag;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font: 700 14px/1 'Segoe UI', system-ui, sans-serif;
        cursor: pointer;
      }
      #toggle {
        background: #374151;
        color: #fff;
      }
      #toggle.on {
        background: #ef4444;
        color: #fff;
      }
      #quit {
        margin-top: 8px;
        background: transparent;
        color: #9ca3af;
        font-size: 11px;
        padding: 6px;
      }
      p {
        margin-top: 8px;
        font-size: 10px;
        color: #9ca3af;
        font-weight: 400;
        -webkit-app-region: no-drag;
      }
    </style>
  </head>
  <body>
    <h1>Lazy Laser</h1>
    <button id="toggle" type="button">Laser OFF — click to turn ON</button>
    <button id="quit" type="button">Quit</button>
    <p>Ctrl+Alt+L also toggles</p>
    <script src="control.js"></script>
  </body>
</html>
